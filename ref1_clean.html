<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AIPT - All India PrepAIred Test</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#38b6ff",
                        "secondary": "#18356b",
                        "brand-dark": "#252627",
                        "brand-light": "#f9f9f9",
                        "brand-blue": "#0066ff",
                        "deep-blue": "#004aad",
                        "accent-blue": "#3291ca",
                        "border-grey": "#dee1e7",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }</script>
<style>
        .grid-bg {
            background-image: radial-gradient(circle, #38b6ff20 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="font_display bg-brand-light dark:bg-brand-dark text-brand-dark dark:text-white min-h-screen">
<div class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Futuristic Grid Background -->
<div class="absolute inset-0 grid-bg opacity-40 pointer-events-none"></div>
<div class="absolute inset-0 bg-gradient-to-b from-white/50 via-transparent to-white/80 pointer-events-none"></div>
<!-- Navigation Header -->
<header class="absolute top-0 w-full px-6 py-6 md:px-20 flex justify-between items-center z-10">
<div class="flex items-center gap-3">
<img alt="AIPT Logo" class="h-10 w-auto" data-alt="AIPT official logo showing professional educational branding" src="..."/>
<span class="text-secondary dark:text-primary font-bold text-xl tracking-tight">AIPT</span>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-sm font-medium text-slate-600 hover:text-primary transition-colors" href="#">About Test</a>
<a class="text-sm font-medium text-slate-600 hover:text-primary transition-colors" href="#">Syllabus</a>
<a class="px-5 py-2 rounded-full border border-primary text-primary text-sm font-semibold hover:bg-primary hover:text-white transition-all" href="#">Support</a>
</div>
</header>
<!-- Main Content Area -->
<main class="relative z-10 w-full max-w-2xl px-6 py-20 text-center">
<h1 class="text-5xl md:text-7xl font-black text-secondary dark:text-slate-100 leading-tight tracking-tighter mb-6">
                Register for <span class="text-primary">AIPT</span>
</h1>
<p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 font-normal leading-relaxed mb-12 max-w-xl mx-auto">
                Free for all JEE Aspirants. Compete with the best minds in India on <span class="font-bold text-secondary dark:text-primary">13th &amp; 15th October</span>.
            </p>
<!-- Registration Card -->
<div class="bg-white dark:bg-slate-800/40 backdrop-blur-md p-10 rounded-3xl border border-border-grey dark:border-slate-700 shadow-xl shadow-slate-200/50 dark:shadow-none">
<form class="space-y-8">
<!-- Date Selection -->
<div class="space-y-4">
<label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-base">calendar_month</span>
                            Select Test Date
                        </label>
<div class="grid grid-cols-3 gap-4">
<label class="cursor-pointer group">
<input class="hidden peer" name="test_date" type="radio" value="13"/>
<div class="py-4 px-2 rounded-2xl border border-border-grey bg-white dark:bg-slate-800 dark:border-slate-700 text-slate-600 dark:text-slate-300 peer-checked:border-brand-blue peer-checked:bg-brand-blue peer-checked:text-white transition-all text-sm font-semibold text-center group-hover:border-brand-blue/30">
                                    13th Oct
                                </div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="test_date" type="radio" value="15"/>
<div class="py-4 px-2 rounded-2xl border border-border-grey bg-white dark:bg-slate-800 dark:border-slate-700 text-slate-600 dark:text-slate-300 peer-checked:border-brand-blue peer-checked:bg-brand-blue peer-checked:text-white transition-all text-sm font-semibold text-center group-hover:border-brand-blue/30">
                                    15th Oct
                                </div>
</label>
<label class="cursor-pointer group">
<input checked="" class="hidden peer" name="test_date" type="radio" value="both"/>
<div class="py-4 px-2 rounded-2xl border border-border-grey bg-white dark:bg-slate-800 dark:border-slate-700 text-slate-600 dark:text-slate-300 peer-checked:border-brand-blue peer-checked:bg-brand-blue peer-checked:text-white transition-all text-sm font-semibold text-center group-hover:border-brand-blue/30">
                                    Both
                                </div>
</label>
</div>
</div>
<!-- Inputs -->
<div class="space-y-4">
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-blue transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-2xl bg-brand-light dark:bg-slate-900 border border-border-grey dark:border-slate-700 focus:border-brand-blue focus:ring-0 focus:bg-white transition-all text-slate-900 dark:text-white placeholder:text-slate-400 font-medium" placeholder="Email Address" type="email"/>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-blue transition-colors">call</span>
<input class="w-full pl-12 pr-4 py-4 rounded-2xl bg-brand-light dark:bg-slate-900 border border-border-grey dark:border-slate-700 focus:border-brand-blue focus:ring-0 focus:bg-white transition-all text-slate-900 dark:text-white placeholder:text-slate-400 font-medium" placeholder="Mobile Number" type="tel"/>
</div>
<p class="text-[9px] text-slate-400 text-center uppercase tracking-[0.2em] font-black pt-2">Verified Registration with PrepAIred</p>
</div>
<!-- Submit Button -->
<button class="w-full bg-brand-blue hover:bg-deep-blue text-white font-bold py-5 rounded-2xl transition-all transform active:scale-[0.99] shadow-lg shadow-brand-blue/20 flex items-center justify-center gap-3 text-lg" type="submit">
<span>Register for AIPT</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
</div>
<!-- Trust Badges -->
<div class="mt-12 flex flex-wrap justify-center items-center gap-8 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">verified_user</span>
<span class="text-xs font-bold text-secondary dark:text-slate-300">10k+ Aspirants</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">analytics</span>
<span class="text-xs font-bold text-secondary dark:text-slate-300">Real-time Ranking</span>
</div>
</div>
</main>
<!-- Footer -->
<footer class="absolute bottom-6 w-full text-center px-6">
<p class="text-xs text-slate-400">© 2023 AIPT by PrepAIred. All Rights Reserved.</p>
</footer>
</div>
</body></html>
